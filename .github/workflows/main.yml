name: build

on:
  push:
    branches:
      - main
      - dev*
      - v[0-9]+.[0-9]+.[0-9]+
    tags:
      - v[0-9]+.[0-9]+.[0-9]+
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  build-win:
    runs-on: windows-latest
    name: Ruby 3.4 (Windows)
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby 3.4
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
      - name: Install numo-narray
        env:
          CFLAGS_VAL: -Wno-incompatible-pointer-types -Wno-compare-distinct-pointer-types -std=c90
        run: gem install numo-narray -- --with-cflags="%CFLAGS_VAL%"
      - name: Install BLAS and LAPACK
        run: pacman -S --noconfirm mingw-w64-ucrt-x86_64-openblas mingw-w64-ucrt-x86_64-lapack
      - name: Build and test with Rake
        run: |
          bundle config build.numo-narray "--with-cflags=\"-Wno-incompatible-pointer-types -Wno-compare-distinct-pointer-types -std=c90\""
          bundle config build.numo-tiny_linalg "--with-opt-lib=C:\msys64\ucrt64\lib --with-opt-include=C:\msys64\ucrt64\include\openblas"
          bash rumale-test.sh
